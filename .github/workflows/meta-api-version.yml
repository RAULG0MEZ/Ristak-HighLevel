name: Meta API Version Check

on:
  push:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  update-meta-api-version:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      META_API_VERSION: ${{ vars.META_API_VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: DATABASE_URL missing
        if: ${{ env.DATABASE_URL == '' }}
        run: |
          echo "DATABASE_URL secret is not configured; skipping direct DB version update."
          echo "Render startup and the backend monthly cron will still check Meta API versions."

      - name: Setup Node
        if: ${{ env.DATABASE_URL != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        if: ${{ env.DATABASE_URL != '' }}
        run: npm ci --prefix backend

      - name: Update Meta API version
        if: ${{ env.DATABASE_URL != '' }}
        run: npm run meta:update-version --prefix backend
